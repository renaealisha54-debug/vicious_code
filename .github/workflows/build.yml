name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Always checkout the code first
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the Java environment
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Gradle (Caches dependencies to speed up future builds)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 4. CRITICAL: Grant execute permission for gradlew
      # This fixes the "No such file or directory" / "Exit code 127" error
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Build the APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # 6. Upload the generated APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
