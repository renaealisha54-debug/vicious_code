jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. First, get the code
      - uses: actions/checkout@v4
      
      # 2. Second, set up the environment (this uses the code just checked out)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # 3. Third, run your build commands
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
