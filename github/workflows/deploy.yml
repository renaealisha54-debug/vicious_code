name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # This is the trigger: runs when you push to 'main'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # If you have a build step (like React/Vue/Sass), include it here:
      # - run: npm install
      # - run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # Change this to your build folder if you have one (e.g., ./dist or ./build)
          
